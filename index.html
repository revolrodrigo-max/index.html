<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard COO — Testo Boost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --bg:#0A0C0F;--s1:#111318;--s2:#181C22;--s3:#1E232B;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#E8EDF3;--muted:#6B7280;--muted2:#9CA3AF;
  --green:#22C55E;--gbg:rgba(34,197,94,.1);--gborder:rgba(34,197,94,.25);
  --amber:#F59E0B;--abg:rgba(245,158,11,.1);--aborder:rgba(245,158,11,.25);
  --red:#EF4444;--rbg:rgba(239,68,68,.1);--rborder:rgba(239,68,68,.25);
  --blue:#3B82F6;--bbg:rgba(59,130,246,.1);--bborder:rgba(59,130,246,.25);
  --orange:#F97316;--obg:rgba(249,115,22,.1);--oborder:rgba(249,115,22,.25);
  --purple:#8B5CF6;--pbg:rgba(139,92,246,.1);--pborder:rgba(139,92,246,.25);
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}

.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:30px;height:30px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center}
.brand-icon i{font-size:16px;color:#000}
.brand-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.brand-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.topbar-right{display:flex;align-items:center;gap:10px}
.date-pill{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--s2);border:1px solid var(--border2);padding:4px 10px;border-radius:20px}
.btn-refresh{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:6px;background:var(--green);border:none;color:#000;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn-refresh:hover{opacity:.85}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.btn-refresh.loading i{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--green)}.dot-warn{background:var(--amber)}.dot-err{background:var(--red)}.dot-idle{background:var(--muted)}

.main-tabs{display:flex;gap:2px;background:var(--s2);border-radius:var(--r);padding:3px}
.main-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.main-tab.active{background:var(--s3);color:var(--text)}
.main-tab:hover:not(.active){color:var(--muted2)}

.main{padding:1.5rem;max-width:1440px;margin:0 auto}
.page{display:none}.page.active{display:block}

.eq-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.eq-tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s}
.eq-tab:hover:not(.active){color:var(--muted2)}
.eq-tab.eq1.active{background:var(--bbg);color:var(--blue);border-color:var(--bborder)}
.eq-tab.eq2.active{background:var(--gbg);color:var(--green);border-color:var(--gborder)}
.eq-tab.eq3.active{background:var(--abg);color:var(--amber);border-color:var(--aborder)}
.eq-tab.all.active{background:var(--s3);color:var(--text);border-color:var(--border2)}
.eq-content{display:none}.eq-content.active{display:block}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mc.green::before{background:var(--green)}.mc.amber::before{background:var(--amber)}
.mc.red::before{background:var(--red)}.mc.blue::before{background:var(--blue)}
.mc.purple::before{background:var(--purple)}.mc.orange::before{background:var(--orange)}
.mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;margin-bottom:4px}
.mc-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px}
.mc-val.g{color:var(--green)}.mc-val.a{color:var(--amber)}.mc-val.r{color:var(--red)}.mc-val.b{color:var(--blue)}.mc-val.m{color:var(--muted2)}.mc-val.p{color:var(--purple)}.mc-val.o{color:var(--orange)}
.mc-sub{font-size:11px;color:var(--muted);margin-top:4px}

.section{margin-bottom:2rem}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-hdr i{font-size:17px}
.sec-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600}
.sec-badge{margin-left:auto;font-size:10px;font-weight:500;font-family:'DM Mono',monospace;padding:2px 9px;border-radius:20px}
.sb-r{background:var(--rbg);color:var(--red);border:1px solid var(--rborder)}
.sb-g{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.sb-a{background:var(--abg);color:var(--amber);border:1px solid var(--aborder)}
.sb-b{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}
.sb-gr{background:var(--s2);color:var(--muted2);border:1px solid var(--border2)}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;font-family:'DM Mono',monospace}
.bx-r{background:var(--rbg);color:var(--red);border:1px solid var(--rborder)}
.bx-a{background:var(--abg);color:var(--amber);border:1px solid var(--aborder)}
.bx-g{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.bx-b{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}
.bx-gr{background:var(--s2);color:var(--muted2);border:1px solid var(--border2)}
.bx-p{background:var(--pbg);color:var(--purple);border:1px solid var(--pborder)}
.bx-o{background:var(--obg);color:var(--orange);border:1px solid var(--oborder)}

.prof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.prof-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;transition:border-color .15s}
.prof-card:hover{border-color:var(--border2)}
.prof-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
.av-g{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.av-a{background:var(--abg);color:var(--amber);border:1px solid var(--aborder)}
.av-r{background:var(--rbg);color:var(--red);border:1px solid var(--rborder)}
.av-b{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}
.prof-name{font-size:12px;font-weight:500}
.prof-role{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.bar-wrap{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin:7px 0 5px}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.bar-ok{background:var(--green)}.bar-warn{background:var(--amber)}.bar-danger{background:var(--red)}
.prof-nums{display:flex;justify-content:space-between}
.pn{text-align:center}
.pn-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.pn-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}

.ct-table{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.ct-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.ct-row:last-child{border-bottom:none}
.ct-row:hover{background:var(--s2)}
.ct-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
.ct-info{flex:1}
.ct-name{font-size:12px;font-weight:500}
.ct-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

.adh-list{display:flex;flex-direction:column;gap:8px}
.adh-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.adh-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.adh-hdr:hover{background:var(--s2)}
.risk-stripe{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0}
.rs-r{background:var(--red)}.rs-a{background:var(--amber)}.rs-gr{background:var(--muted)}
.adh-name-block{flex:1}
.adh-name{font-size:12px;font-weight:500}
.adh-sub{font-size:10px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.adh-chevron{font-size:15px;color:var(--muted);transition:transform .2s;margin-left:6px}
.adh-card.open .adh-chevron{transform:rotate(180deg)}
.adh-body{display:none;padding:0 14px 13px;border-top:1px solid var(--border);padding-top:10px}
.adh-card.open .adh-body{display:block}
.adh-ctx{font-size:11px;color:var(--muted2);line-height:1.6;background:var(--s2);padding:9px 11px;border-left:2px solid var(--border2);margin-bottom:8px}
.ac-list{display:flex;flex-direction:column;gap:5px}
.ac-row{display:flex;align-items:flex-start;gap:9px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;font-size:11px;color:var(--text);line-height:1.4}
.ac-row i{font-size:13px;flex-shrink:0;margin-top:1px}
.ac-resp{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:'DM Mono',monospace;color:var(--blue);background:var(--bbg);border:1px solid var(--bborder);padding:1px 6px;border-radius:20px;margin-top:3px}

.eq-sep{display:flex;align-items:center;gap:8px;margin:1.25rem 0 .75rem;padding:8px 12px;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:12px;font-weight:700}
.eq-sep.eq1{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}
.eq-sep.eq2{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.eq-sep.eq3{background:var(--abg);color:var(--amber);border:1px solid var(--aborder)}

.skeleton{background:var(--s2);border-radius:var(--r);height:44px;margin-bottom:6px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state i{font-size:32px;display:block;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:12px}

.footer{padding:1.5rem;max-width:1440px;margin:0 auto;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;flex-wrap:wrap;gap:6px}
</style>
</head>
<body>

<nav class="topbar">

<script>
/* ═══════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════ */
const URLS = {
  eq1: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2O5nKEHPlQThz-95nZJ_XClZR--s5LwBKdY5o3rSw84XjboXob2QrJj2yJKlx9UMoaUKmDqEtAsaj/pub?gid=312678916&single=true&output=csv',
  eq2: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2O5nKEHPlQThz-95nZJ_XClZR--s5LwBKdY5o3rSw84XjboXob2QrJj2yJKlx9UMoaUKmDqEtAsaj/pub?gid=42305981&single=true&output=csv',
  eq3: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2O5nKEHPlQThz-95nZJ_XClZR--s5LwBKdY5o3rSw84XjboXob2QrJj2yJKlx9UMoaUKmDqEtAsaj/pub?gid=2141207433&single=true&output=csv',
  adherencia: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2O5nKEHPlQThz-95nZJ_XClZR--s5LwBKdY5o3rSw84XjboXob2QrJj2yJKlx9UMoaUKmDqEtAsaj/pub?gid=770594017&single=true&output=csv',
  disponibilidad: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2O5nKEHPlQThz-95nZJ_XClZR--s5LwBKdY5o3rSw84XjboXob2QrJj2yJKlx9UMoaUKmDqEtAsaj/pub?gid=578212844&single=true&output=csv',
};

/* ═══════════════════════════════════════
   CSV PARSER — handles multiline, \r\n, decorative rows
   ═══════════════════════════════════════ */
function csvLines(txt){
  const res=[]; let cur='',inQ=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"') inQ=!inQ;
    else if((c==='\r'||c==='\n')&&!inQ){
      if(c==='\r'&&txt[i+1]==='\n') i++;
      res.push(cur); cur='';
    } else cur+=c;
  }
  if(cur) res.push(cur);
  return res;
}
function splitCSV(line){
  const res=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"') inQ=!inQ;
    else if(line[i]===','&&!inQ){res.push(cur);cur='';}
    else cur+=line[i];
  }
  res.push(cur);
  return res;
}
function parseSheet(txt, headerMarker, requiredCol){
  const lines = csvLines(txt);
  const hIdx = lines.findIndex(l => l.toUpperCase().includes(headerMarker.toUpperCase()));
  if(hIdx < 0) return [];
  const headers = splitCSV(lines[hIdx]).map(h => h.trim());
  const rows = [];
  for(let i = hIdx+1; i < lines.length; i++){
    const vals = splitCSV(lines[i]);
    const obj = {};
    headers.forEach((h,idx) => { if(h) obj[h] = (vals[idx]||'').trim(); });
    if(requiredCol && !obj[requiredCol]) continue;
    if(!Object.values(obj).some(v=>v)) continue;
    rows.push(obj);
  }
  return rows;
}
async function fetchSheet(url, headerMarker, requiredCol){
  try{
    const r = await fetch(url+'&cachebust='+Date.now());
    if(!r.ok) return [];
    return parseSheet(await r.text(), headerMarker, requiredCol);
  }catch(e){ return []; }
}

/* ═══════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════ */
function g(id){ return document.getElementById(id); }
function initials(n){ return (n||'').split(' ').slice(0,2).map(w=>(w||'')[0]||'').join('').toUpperCase()||'?'; }
function parseDate(str){
  if(!str) return null;
  const p = str.split('/');
  if(p.length!==3) return null;
  return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
}
function getWeekRange(){
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day===0?6:day-1)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {start:mon, end:sun};
}
function getMonthRange(){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
  return {start, end};
}
function inRange(dateStr, range){
  const d = parseDate(dateStr);
  return d && d >= range.start && d <= range.end;
}
function setStatus(state, txt){
  g('statusDot').className = 'status-dot '+(state==='ok'?'dot-ok':state==='warn'?'dot-warn':state==='err'?'dot-err':'dot-idle');
  g('statusTxt').textContent = txt;
}
function setLoading(on){
  const btn = g('btnRefresh');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}
function emptyState(msg){ return `<div class="empty-state"><i class="ti ti-inbox"></i><p>${msg}</p></div>`; }

/* ═══════════════════════════════════════
   RENDER: PROGRAMA (pacientes activos / pausa)
   ═══════════════════════════════════════ */
function renderPrograma(allEq){
  const week = getWeekRange();
  const month = getMonthRange();

  function statsFor(rows){
    const activos = rows.filter(r=>(r.ESTADO||'').toUpperCase()==='ACTIVO');
    const pausa = rows.filter(r=>(r.ESTADO||'').toUpperCase().includes('PAUSA'));
    const total = rows.length;
    const cierresSemana = rows.filter(r=>inRange(r.FIN, week));
    const cierresMes = rows.filter(r=>inRange(r.FIN, month));
    return {total, activos:activos.length, pausa:pausa.length, cierresSemana:cierresSemana.length, cierresMes:cierresMes.length, rowsCierresSemana:cierresSemana, rowsCierresMes:cierresMes};
  }

  function metricsHTML(s, label){
    return `<div class="metrics">
      <div class="mc blue"><div class="mc-label">Total pacientes</div><div class="mc-val b">${s.total}</div><div class="mc-sub">${label}</div></div>
      <div class="mc green"><div class="mc-label">Activos</div><div class="mc-val g">${s.activos}</div><div class="mc-sub">En programa</div></div>
      <div class="mc amber"><div class="mc-label">En pausa</div><div class="mc-val a">${s.pausa}</div><div class="mc-sub">Pausados</div></div>
      <div class="mc orange"><div class="mc-label">Cierres semana</div><div class="mc-val o">${s.cierresSemana}</div><div class="mc-sub">Semana actual</div></div>
      <div class="mc purple"><div class="mc-label">Cierres mes</div><div class="mc-val p">${s.cierresMes}</div><div class="mc-sub">Mes actual</div></div>
    </div>`;
  }

  function pausaListHTML(rows){
    const pausa = rows.filter(r=>(r.ESTADO||'').toUpperCase().includes('PAUSA'));
    if(!pausa.length) return '';
    return `<div class="section"><div class="sec-hdr"><i class="ti ti-player-pause" style="color:var(--amber)"></i><span class="sec-title">Pacientes en pausa</span><span class="sec-badge sb-a">${pausa.length}</span></div>
      <div class="ct-table">${pausa.map(r=>{
        const nombre = r['NOMBRE COMPLETO']||'—';
        const dur = r.DURACION||'';
        const sem = r['SEMANA DEL PROGRAMA']||'';
        return `<div class="ct-row">
          <div class="ct-av av-a">${initials(nombre)}</div>
          <div class="ct-info"><div class="ct-name">${nombre}</div><div class="ct-meta">${[dur,sem].filter(Boolean).join(' · ')}</div></div>
          <span class="badge bx-a">En pausa</span>
        </div>`;
      }).join('')}</div></div>`;
  }

  // ALL
  const allRows = [...allEq[0].rows, ...allEq[1].rows, ...allEq[2].rows];
  const sAll = statsFor(allRows);
  let allHTML = metricsHTML(sAll, 'Todos los equipos');
  allEq.forEach((eq, i) => {
    const s = statsFor(eq.rows);
    allHTML += `<div class="eq-sep eq${i+1}"><i class="ti ti-users" style="font-size:14px"></i>${eq.label} — ${s.activos} activos · ${s.pausa} pausa · ${s.cierresSemana} cierres semana</div>`;
  });
  allHTML += pausaListHTML(allRows);
  g('programa-all').innerHTML = allHTML;

  // Per equipo
  allEq.forEach((eq, i) => {
    const s = statsFor(eq.rows);
    let html = metricsHTML(s, eq.label);
    html += pausaListHTML(eq.rows);
    g('programa-eq'+(i+1)).innerHTML = html;
  });
}

/* ═══════════════════════════════════════
   RENDER: CIERRES (solo pacientes con FIN en semana/mes actual)
   ═══════════════════════════════════════ */
function renderCierres(allEq){
  const week = getWeekRange();
  const month = getMonthRange();

  function cierresBadge(renov){
    const r = (renov||'').toUpperCase();
    if(r==='SI'||r==='SÍ') return {bx:'bx-g',av:'av-g',label:'Renovó'};
    if(r==='NO') return {bx:'bx-r',av:'av-r',label:'No renovó'};
    return {bx:'bx-a',av:'av-a',label:'En proceso'};
  }

  function cierreTable(rows){
    if(!rows.length) return emptyState('Sin cierres en este periodo.');
    return `<div class="ct-table">${rows.map(r=>{
      const nombre = r['NOMBRE COMPLETO']||'—';
      const fin = r.FIN||'';
      const dur = r.DURACION||'';
      const sem = r['SEMANA DEL PROGRAMA']||'';
      const renov = r['RENOVÓ']||r.RENOVO||'';
      const notas = r['Notas Cierre']||r['NOTAS CIERRE']||r.NOTAS||'';
      const {bx,av,label} = cierresBadge(renov);
      const meta = [dur, fin?'Cierre: '+fin:'', sem, notas].filter(Boolean).join(' · ');
      return `<div class="ct-row">
        <div class="ct-av ${av}">${initials(nombre)}</div>
        <div class="ct-info"><div class="ct-name">${nombre}</div><div class="ct-meta">${meta||'—'}</div></div>
        <span class="badge ${bx}">${label}</span>
      </div>`;
    }).join('')}</div>`;
  }

  function cierresBlock(rows, label){
    const cSem = rows.filter(r=>inRange(r.FIN, week));
    const cMes = rows.filter(r=>inRange(r.FIN, month));
    const siSem = cSem.filter(r=>{const v=(r['RENOVÓ']||r.RENOVO||'').toUpperCase();return v==='SÍ'||v==='SI';}).length;
    const noSem = cSem.filter(r=>(r['RENOVÓ']||r.RENOVO||'').toUpperCase()==='NO').length;
    const pendSem = cSem.length - siSem - noSem;
    const siMes = cMes.filter(r=>{const v=(r['RENOVÓ']||r.RENOVO||'').toUpperCase();return v==='SÍ'||v==='SI';}).length;
    const noMes = cMes.filter(r=>(r['RENOVÓ']||r.RENOVO||'').toUpperCase()==='NO').length;

    return `<div class="metrics">
      <div class="mc orange"><div class="mc-label">Cierres semana</div><div class="mc-val o">${cSem.length}</div><div class="mc-sub">${label}</div></div>
      <div class="mc green"><div class="mc-label">Renovaron (sem)</div><div class="mc-val g">${siSem}</div></div>
      <div class="mc red"><div class="mc-label">No renovaron (sem)</div><div class="mc-val r">${noSem}</div></div>
      <div class="mc amber"><div class="mc-label">Pendientes (sem)</div><div class="mc-val a">${pendSem}</div></div>
      <div class="mc purple"><div class="mc-label">Cierres mes</div><div class="mc-val p">${cMes.length}</div><div class="mc-sub">Renovaron: ${siMes} · No: ${noMes}</div></div>
    </div>
    <div class="section">
      <div class="sec-hdr"><i class="ti ti-calendar-event" style="color:var(--orange)"></i><span class="sec-title">Cierres de la semana</span><span class="sec-badge sb-a">${cSem.length} pacientes</span></div>
      ${cierreTable(cSem)}
    </div>
    <div class="section">
      <div class="sec-hdr"><i class="ti ti-calendar-month" style="color:var(--purple)"></i><span class="sec-title">Cierres del mes</span><span class="sec-badge sb-gr">${cMes.length} pacientes</span></div>
      ${cierreTable(cMes)}
    </div>`;
  }

  // ALL
  const allRows = [...allEq[0].rows, ...allEq[1].rows, ...allEq[2].rows];
  let allHTML = cierresBlock(allRows, 'Todos los equipos');
  g('cierres-all').innerHTML = allHTML;

  allEq.forEach((eq, i) => {
    g('cierres-eq'+(i+1)).innerHTML = cierresBlock(eq.rows, eq.label);
  });
}

/* ═══════════════════════════════════════
   RENDER: DISPONIBILIDAD
   ═══════════════════════════════════════ */
function renderDisp(data){
  function profCard(p){
    const nombre = p.PROFESIONAL||'—';
    const rol = p.ROL||'';
    const ag = parseInt(p.AGENDADAS||0)||0;
    const lib = parseInt(p.LIBRES||0)||0;
    const tot = parseInt(p['CAP. MÁX']||0)||0;
    const pct = parseFloat((p['OCUP. %']||'0').replace('%',''))||0;
    const pctR = Math.min(Math.round(pct),100);
    const bc = pct>=90?'bar-danger':pct>=65?'bar-warn':'bar-ok';
    const bx = pct>=90?'bx-r':pct>=65?'bx-a':'bx-g';
    const bl = pct>=99?'Saturado':pct>=90?'Alta':pct>=65?'Media':pct>=30?'Baja':'Disponible';
    const vc = pct>=90?'var(--red)':pct>=65?'var(--amber)':'var(--green)';
    const av = pct>=90?'av-r':pct>=65?'av-a':'av-g';
    return `<div class="prof-card">
      <div class="prof-top">
        <div class="av ${av}">${initials(nombre)}</div>
        <div style="flex:1"><div class="prof-name">${nombre}</div><div class="prof-role">${rol}</div></div>
        <span class="badge ${bx}">${bl}</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill ${bc}" style="width:${pctR}%"></div></div>
      <div class="prof-nums">
        <div class="pn"><div class="pn-val" style="color:var(--blue)">${ag}</div><div class="pn-lbl">agend.</div></div>
        <div class="pn"><div class="pn-val" style="color:var(--green)">${lib}</div><div class="pn-lbl">libres</div></div>
        <div class="pn"><div class="pn-val" style="color:var(--muted2)">${tot||'—'}</div><div class="pn-lbl">cap.max</div></div>
        <div class="pn"><div class="pn-val" style="color:${vc}">${pctR}%</div><div class="pn-lbl">ocup.</div></div>
      </div>
    </div>`;
  }

  function dispBlock(profs, label){
    const sorted = [...profs].sort((a,b)=>{
      return (parseFloat((b['OCUP. %']||'0').replace('%',''))||0) - (parseFloat((a['OCUP. %']||'0').replace('%',''))||0);
    });
    let totalLib=0, totalAg=0, saturados=0, sumOcup=0;
    sorted.forEach(p=>{
      const lib = parseInt(p.LIBRES||0)||0;
      const ag = parseInt(p.AGENDADAS||0)||0;
      const pct = parseFloat((p['OCUP. %']||'0').replace('%',''))||0;
      totalLib+=lib; totalAg+=ag; sumOcup+=pct;
      if(pct>=99) saturados++;
    });
    const promOcup = sorted.length>0 ? Math.round(sumOcup/sorted.length) : 0;
    return `<div class="metrics">
      <div class="mc blue"><div class="mc-label">Horas libres</div><div class="mc-val b">${totalLib}h</div><div class="mc-sub">${label}</div></div>
      <div class="mc green"><div class="mc-label">Sesiones agendadas</div><div class="mc-val g">${totalAg}</div></div>
      <div class="mc red"><div class="mc-label">Saturados</div><div class="mc-val r">${saturados}</div><div class="mc-sub">100% ocupación</div></div>
      <div class="mc amber"><div class="mc-label">Ocupación promedio</div><div class="mc-val a">${promOcup}%</div></div>
    </div>
    <div class="section">
      <div class="sec-hdr"><i class="ti ti-calendar-stats" style="color:var(--blue)"></i><span class="sec-title">Profesionales</span><span class="sec-badge sb-b">${sorted.length} profesionales</span></div>
      <div class="prof-grid">${sorted.length ? sorted.map(profCard).join('') : emptyState('Sin datos de disponibilidad.')}</div>
    </div>`;
  }

  const eq1 = data.filter(p=>(p.EQUIPO||'').includes('1'));
  const eq2 = data.filter(p=>(p.EQUIPO||'').includes('2'));
  const eq3 = data.filter(p=>(p.EQUIPO||'').includes('3'));

  // ALL — show segmented
  let allHTML = dispBlock(data, 'Todos los equipos');
  g('disponibilidad-all').innerHTML = allHTML;
  g('disponibilidad-eq1').innerHTML = dispBlock(eq1, 'Equipo 1');
  g('disponibilidad-eq2').innerHTML = dispBlock(eq2, 'Equipo 2');
  g('disponibilidad-eq3').innerHTML = dispBlock(eq3, 'Equipo 3');
}

/* ═══════════════════════════════════════
   RENDER: ADHERENCIA
   ═══════════════════════════════════════ */
function renderAdh(data){
  function nivelConfig(nivel){
    const n=(nivel||'').toLowerCase();
    if(n.includes('crít')||n.includes('crit')) return {rs:'rs-r',bx:'bx-r',label:'Crítico'};
    if(n.includes('moder')) return {rs:'rs-a',bx:'bx-a',label:'Moderado'};
    if(n.includes('bajo')) return {rs:'rs-a',bx:'bx-a',label:'Bajo avance'};
    return {rs:'rs-gr',bx:'bx-gr',label:'Monitoreo'};
  }
  function adhCard(row, id){
    const nombre = row['NOMBRE PACIENTE']||row.PACIENTE||'—';
    const nivel = row['NIVEL RIESGO']||row.NIVEL||'';
    const tipo = row['TIPO PROBLEMA']||'';
    const ctx = row['CONTEXTO / SITUACIÓN']||row.CONTEXTO||'';
    const accion = row['ACCIONABLE PRINCIPAL']||row.ACCIONABLE||'';
    const resp = row['RESPONSABLE ACCIONABLE']||row.RESPONSABLE||'—';
    const estado = row['ESTADO ACCIONABLE']||row.ESTADO||'PENDIENTE';
    const fecha = row['FECHA LÍMITE']||row.FECHA||'';
    const {rs,bx,label} = nivelConfig(nivel);
    const sub = [tipo, fecha?'Límite: '+fecha:'', estado].filter(Boolean).join(' · ');
    return `<div class="adh-card" id="${id}">
      <div class="adh-hdr" onclick="this.parentElement.classList.toggle('open')">
        <div class="risk-stripe ${rs}"></div>
        <div class="adh-name-block">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <span class="adh-name">${nombre}</span>
            <span class="badge ${bx}">${label}</span>
          </div>
          <div class="adh-sub">${sub||'Sin descripción'}</div>
        </div>
        <i class="ti ti-chevron-down adh-chevron"></i>
      </div>
      <div class="adh-body">
        ${ctx?`<div class="adh-ctx">${ctx}</div>`:''}
        <div class="ac-list"><div class="ac-row">
          <i class="ti ti-arrow-right" style="color:var(--blue)"></i>
          <div>${accion||'Sin accionable registrado'}
            <div><span class="ac-resp"><i class="ti ti-user" style="font-size:9px"></i>${resp}</span></div>
          </div>
        </div></div>
      </div>
    </div>`;
  }

  function adhBlock(rows, label){
    const count = (arr,kw) => arr.filter(r=>(r['NIVEL RIESGO']||'').toLowerCase().includes(kw)).length;
    const criticos = count(rows,'crít') + count(rows,'crit');
    const moderados = count(rows,'moder') + count(rows,'bajo');
    const monit = Math.max(rows.length - criticos - moderados, 0);
    return `<div class="metrics">
      <div class="mc red"><div class="mc-label">Críticos</div><div class="mc-val r">${criticos}</div><div class="mc-sub">Acción inmediata</div></div>
      <div class="mc amber"><div class="mc-label">Moderados</div><div class="mc-val a">${moderados}</div><div class="mc-sub">Seguimiento activo</div></div>
      <div class="mc"><div class="mc-label">Monitoreo</div><div class="mc-val m">${monit}</div><div class="mc-sub">Vigilancia</div></div>
      <div class="mc blue"><div class="mc-label">Total en riesgo</div><div class="mc-val b">${rows.length}</div><div class="mc-sub">${label}</div></div>
    </div>
    <div class="section">
      <div class="sec-hdr"><i class="ti ti-alert-triangle" style="color:var(--amber)"></i><span class="sec-title">Pacientes en riesgo</span><span class="sec-badge sb-a">${rows.length} pacientes</span></div>
      <div class="adh-list">${rows.length ? rows.map((r,i)=>{
        const card = adhCard(r, 'adh-'+label.replace(/\s/g,'')+'-'+i);
        return card;
      }).join('') : emptyState('Sin pacientes en riesgo.')}</div>
    </div>`;
  }

  const eq1 = data.filter(r=>(r.EQUIPO||'').includes('1'));
  const eq2 = data.filter(r=>(r.EQUIPO||'').includes('2'));
  const eq3 = data.filter(r=>(r.EQUIPO||'').includes('3'));

  g('adherencia-all').innerHTML = adhBlock(data, 'Todos los equipos');
  g('adherencia-eq1').innerHTML = adhBlock(eq1, 'Equipo 1');
  g('adherencia-eq2').innerHTML = adhBlock(eq2, 'Equipo 2');
  g('adherencia-eq3').innerHTML = adhBlock(eq3, 'Equipo 3');

  // Auto-open criticos
  data.forEach((r,i)=>{
    if((r['NIVEL RIESGO']||'').toLowerCase().includes('crít')){
      const el = document.getElementById('adh-Todoslosequipos-'+i);
      if(el) el.classList.add('open');
    }
  });
}

/* ═══════════════════════════════════════
   NAV
   ═══════════════════════════════════════ */
function showMain(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  g('page-'+name).classList.add('active');
  btn.classList.add('active');
}
function showEq(section, eq, btn){
  document.querySelectorAll('#page-'+section+' .eq-content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('#page-'+section+' .eq-tab').forEach(t=>t.classList.remove('active'));
  g(section+'-'+eq).classList.add('active');
  btn.classList.add('active');
}

/* ═══════════════════════════════════════
   LOAD ALL
   ═══════════════════════════════════════ */
async function loadAll(){
  setLoading(true);
  setStatus('idle','Cargando...');
  let errores = 0;

  const [dEq1, dEq2, dEq3, dDisp, dAdh] = await Promise.all([
    fetchSheet(URLS.eq1, 'NOMBRE COMPLETO', 'NOMBRE COMPLETO'),
    fetchSheet(URLS.eq2, 'NOMBRE COMPLETO', 'NOMBRE COMPLETO'),
    fetchSheet(URLS.eq3, 'NOMBRE COMPLETO', 'NOMBRE COMPLETO'),
    fetchSheet(URLS.disponibilidad, 'PROFESIONAL', 'PROFESIONAL'),
    fetchSheet(URLS.adherencia, 'SEMANA ISO', 'NOMBRE PACIENTE'),
  ]);

  const allEq = [
    {label:'Equipo 1', rows:dEq1},
    {label:'Equipo 2', rows:dEq2},
    {label:'Equipo 3', rows:dEq3}
  ];

  // Programa
  try{ renderPrograma(allEq); }catch(e){ console.error('Programa error',e); errores++; }

  // Cierres
  try{ renderCierres(allEq); }catch(e){ console.error('Cierres error',e); errores++; }

  // Disponibilidad
  if(dDisp.length){ try{ renderDisp(dDisp); }catch(e){ console.error('Disp error',e); errores++; } }
  else { ['disponibilidad-all','disponibilidad-eq1','disponibilidad-eq2','disponibilidad-eq3'].forEach(id=>{ g(id).innerHTML = emptyState('No se pudo cargar DISPONIBILIDAD.'); }); errores++; }

  // Adherencia
  if(dAdh.length){ try{ renderAdh(dAdh); }catch(e){ console.error('Adh error',e); errores++; } }
  else { ['adherencia-all','adherencia-eq1','adherencia-eq2','adherencia-eq3'].forEach(id=>{ g(id).innerHTML = emptyState('No se pudo cargar ADHERENCIA.'); }); errores++; }

  const ahora = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  if(errores===0) setStatus('ok','Actualizado '+ahora);
  else if(errores<3) setStatus('warn','Parcial '+ahora);
  else setStatus('err','Error al cargar');
  g('fechaFooter').textContent = 'Actualizado: '+new Date().toLocaleDateString('es-AR')+' '+ahora;
  setLoading(false);
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
const d = new Date();
g('fechaTop').textContent = d.toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
g('fechaFooter').textContent = '';
loadAll();
</script>
